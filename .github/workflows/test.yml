name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Check dist is in sync with src
        run: |
          if ! git diff --quiet -- dist; then
            echo "dist/ is out of date. Run 'npm run build' locally and commit the result."
            git diff --stat -- dist
            exit 1
          fi
